name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install typescript for the TS scanner tests
        run: npm install typescript@^5 --no-save --no-audit --no-fund
      - name: Run self-tests
        run: python3 -m unittest discover -v tests
