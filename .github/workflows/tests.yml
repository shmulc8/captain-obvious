name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install typescript for the TS scanner tests
        run: npm install typescript@5.9.3 --no-save --no-audit --no-fund
      - name: Install mypy for the real-mypy end-to-end test
        run: python3 -m pip install --quiet mypy
      - name: Verify the TS scanner tests will run (typescript resolvable)
        run: node -e "import('typescript').then(()=>process.exit(0),e=>{console.error(e);process.exit(1)})"
        working-directory: skills/captain-obvious/scripts
      - name: Run self-tests
        run: |
          python3 -m unittest discover -v tests 2>&1 | tee /tmp/unittest.log
          test "${PIPESTATUS[0]}" -eq 0
          ! grep -E "skipped" /tmp/unittest.log
